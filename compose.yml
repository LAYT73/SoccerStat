name: soccerstat

services:
  frontend-dev:
    profiles: [ dev ]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    init: true
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules

  frontend-prod:
    profiles: [ prod ]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_FOOTBALL_DATA_API_URL: ${VITE_FOOTBALL_DATA_API_URL:-https://soccerstat-proxy.nsshipilov.workers.dev/api}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
    init: true
    ports:
      - '8080:80'
    restart: unless-stopped
